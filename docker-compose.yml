services:
  # 1. PRODUCTION REACT FRONTEND
  frontend:
    build:
      context: ./ReactFrontend
      dockerfile: Dockerfile
    container_name: mdd_production_frontend

    # Explicitly enforce the low-privilege user at the orchestrator layer
    user: "nginx"

    ports:
      # Map your host port 3200 -> container's unprivileged port 8080
      - "3200:8080"
      - "3201:8081" # port for landing page
    
    volumes:
      # UPDATED: Mounts Nginx logs folder directly to your Windows C:\ drive folder
      - C:\DockerLogs\frontend:/var/log/nginx
      
    networks:
      - mdd_prod_network
    restart: always

  # 2. PRODUCTION DJANGO BACKEND
  backend:
    build:
      context: ./GraduationProject
      dockerfile: Dockerfile
    container_name: mdd_production_backend

    # FORCE COMPOSE AND EXEC COMMANDS TO ALWAYS RUN AS YOUR LOW-PRIVILEGE DOCKERFILE USER
    user: "djangouser"

    volumes:
      # A. HARDENED QUARANTINE STORAGE (Execution Blocked)
      - permanent_quarantine_storage:/app/media/quarantine:noexec,nosuid,nodev

      # B. UPDATED: Maps internal Gunicorn/Django logs directly to your Windows host folder
      - C:\DockerLogs\backend:/app/logs

      # C. PERMANENT MACHINE LEARNING MODEL WEIGHTS
      - backend_models_storage:/app/media/models

      # D. PERMANENT YARA THREAT RULES
      - backend_yara_storage:/app/media/yara_rules

      # E. PERMANENT DATABASE (SQLite) — keeps accounts/reports across rebuilds
      - backend_db_storage:/app/db_data

    environment:
      - DEBUG=0
      - SECRET_KEY=your-super-secret-production-key-here
      - QUARANTINE_ROOT=/app/media/quarantine
      # Force synchronous analysis: dead port -> .delay() fails fast -> sync fallback runs
      - CELERY_BROKER_URL=redis://127.0.0.1:6399/0
      - CELERY_RESULT_BACKEND=redis://127.0.0.1:6399/0
    ports:
      - "8000:8000"
    security_opt:
      - no-new-privileges:true
    networks:
      - mdd_prod_network
    restart: always

networks:
  mdd_prod_network:
    driver: bridge

# GLOBAL VOLUMES DEFINITION
volumes:
  permanent_quarantine_storage:
  # Notice: backend_logs_storage is removed from here since it is now a direct host path bind mount!
  backend_models_storage:
  backend_yara_storage:
  backend_db_storage: