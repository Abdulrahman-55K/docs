version: '3.8'

services:
  # 1. PRODUCTION REACT FRONTEND
  frontend:
    build:
      context: ./ReactFrontend
      dockerfile: Dockerfile
    container_name: mdd_production_frontend
    
    # Explicitly enforce the low-privilege user at the orchestrator layer
    user: "nginx"
    
    ports:
      # Map your host port 3000 -> container's new unprivileged port 8080
      - "3000:8080"
    networks:
      - mdd_prod_network
    restart: always

  # 2. PRODUCTION DJANGO BACKEND
  backend:
    build:
      context: ./GraduationProject
      dockerfile: Dockerfile
    container_name: mdd_production_backend
    
    # FORCE COMPOSE AND EXEC COMMANDS TO ALWAYS RUN AS YOUR LOW-PRIVILEGE DOCKERFILE USER
    user: "djangouser"
    
    volumes:
      # A. HARDENED QUARANTINE STORAGE (Execution Blocked)
      # - noexec: Blocks binary execution inside this storage pool
      # - nosuid: Prevents malicious privilege escalation attempts
      # - nodev: Disables character/block special devices mapping
      - permanent_quarantine_storage:/app/media/quarantine:noexec,nosuid,nodev
      
      # B. PERMANENT SECURITY & SERVER LOGS
      # Stores execution and audit trail history permanently across container rebuilds
      - backend_logs_storage:/app/logs
      
      # C. PERMANENT MACHINE LEARNING MODEL WEIGHTS
      # Prevents heavy trained AI/ML files from getting accidentally deleted
      - backend_models_storage:/app/media/models
      
      # D. PERMANENT YARA THREAT RULES
      # Allows you to dynamically add/edit malware signature rules without losing them
      - backend_yara_storage:/app/media/yara_rules

      - backend_db_storage:/app/db_data  # ◄── ADD THIS LINE HERE
      
    environment:
      - DEBUG=0
      - SECRET_KEY=your-super-secret-production-key-here
      - QUARANTINE_ROOT=/app/media/quarantine
    ports:
      - "8000:8000"
    security_opt:
      - no-new-privileges:true # Blocks malware from ever escalating privileges back to root
    networks:
      - mdd_prod_network
    restart: always

networks:
  mdd_prod_network:
    driver: bridge

# GLOBAL VOLUMES DEFINITION: Allocates isolated permanent spaces inside the Linux WSL2 subsystem
volumes:
  permanent_quarantine_storage:
  backend_logs_storage:
  backend_models_storage:
  backend_yara_storage:
  backend_db_storage: