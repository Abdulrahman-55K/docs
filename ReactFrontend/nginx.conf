# Define the custom log format that extracts the real client IP from headers
log_format realip_combined '$http_x_forwarded_for - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent"';

# SERVER BLOCK 1: Static Welcome Landing Page on Port 8080
server {
    listen 8080;
    server_name _; 

    # STREAM 1: Writes to your Windows C:\DockerLogs\frontend folder
    access_log /var/log/nginx/access.log realip_combined;
    
    # STREAM 2: Writes directly to the container's standard output (stdout console)
    access_log /dev/stdout realip_combined;

    location / {
        root /usr/share/nginx/welcome;
        index index.html;
        try_files $uri $uri/ =404;
    }
}

# SERVER BLOCK 2: React App Ecosystem on Port 8081
server {
    listen 8081;
    server_name _; 

    # STREAM 1: Writes to your Windows C:\DockerLogs\frontend folder
    access_log /var/log/nginx/react_access.log realip_combined;
    
    # STREAM 2: Writes directly to the container's standard output (stdout console)
    access_log /dev/stdout realip_combined;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}