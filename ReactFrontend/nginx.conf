# SERVER BLOCK 1: Static Welcome Landing Page on Port 8080
server {
    listen 8080;
    server_name _; # Catch-all for anything hitting port 8080

    location / {
        root /usr/share/nginx/welcome;
        index index.html;
        try_files $uri $uri/ =404;
    }
}

# SERVER BLOCK 2: React App Ecosystem on Port 8081
server {
    listen 8081;
    server_name _; # Catch-all for anything hitting port 8081

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}